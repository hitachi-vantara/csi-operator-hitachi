apiVersion: v1
kind: Secret
metadata:
  name: secret-sample
type: Opaque
data:
  # base64 encoded storage url. E.g.: echo -n "http://172.16.1.1" | base64
  url: aHR0cDovLzE3Mi4xNi4xLjE=
  # base64 encoded storage username. E.g.: echo -n "User01" | base64
  user: VXNlcjAx
  # base64 encoded storage password. E.g.: echo -n "Password01" | base64
  password: UGFzc3dvcmQwMQ==
  hostModeOptions: ODgsODENCg==
  # base64 encoded storage host mode options. E.g.: echo -n "88,81" | base64
# Port migration configuration
# These values override the original StorageClass port settings.
# Use them only when migrating or updating the target storage port.
stringData:
  portID: CL2-G
  portIP: 172.x.x.x
  enhancedclonemode: "true"
  #These operations apply only to volumes created with the enhancedclonemode parameter set to true and do not apply to existing volumes that are created without this parameter.
  #This feature is supported only on VSP One Block High End and VSP One Block 20 series storage systems.